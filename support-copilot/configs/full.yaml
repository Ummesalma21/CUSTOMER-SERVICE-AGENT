mode: full
seed: 42
device: cuda

data:
  use_all_kb_docs: true
  max_retriever_train_pairs: 20000
  max_reranker_train_pairs: 50000
  max_triage_train_examples: 18000
  max_preference_pairs: 8000
  max_eval_queries: 300

class_balance:
  answer: 0.50
  ticket: 0.25
  reject: 0.25

training:
  retriever_epochs: 2
  reranker_epochs: 1
  triage_epochs: 4
  preference_epochs: 1

retriever_model_name: sentence-transformers/all-MiniLM-L6-v2
reranker_model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model_name: distilbert-base-uncased
triage_max_length: 128
triage_lr: 0.00002
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 1
fp16: true
top_k_retrieval: 20
top_k_rerank: 5
top_k_domains: 2
tau_domain: 0.35
tau_chunk: 0.30
mu_boundary: 0.15
lambda_boundary: 0.6
use_hf_dataset: true
require_hf_dataset: true
include_fixture_docs: true
runtime_reductions:
  max_eval_queries: "reduced from 3000 to 300 after the 3000-query final evaluation exceeded the 1-hour command timeout; training limits were unchanged"
