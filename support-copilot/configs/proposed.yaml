mode: full
seed: 42
device: cuda

data:
  max_eval_queries: 1000

top_k_domains: 2
top_k_retrieval: 20
top_k_rerank: 5
max_rerank_candidates: 15
use_reranker: false
tau_chunk: 0.3
fp16: false

domain_router:
  enabled: true
  model_path: outputs/domain_router/model.pkl
  selected_thresholds_path: outputs/domain_router/selected_thresholds.json
  top_k_domains: 2
  min_domain_confidence: 0.7
  min_candidate_similarity: 0.4
  min_domain_candidates: 5
  enable_global_fallback: true
  fallback_merge_mode: merge
  rerank_after_merge: true

generation:
  enabled: true
  model_name: outputs/generator/flan_t5_fixed
  fallback_model_name: outputs/generator/flan_t5_fixed
  max_new_tokens: 96
  num_beams: 4
  do_sample: false
  top_evidence_count: 1
  answer_only: true
  insufficient_token: INSUFFICIENT_EVIDENCE

answer_quality:
  enabled: true
  min_answer_words: 6
  block_fragment_answers: true
  strip_inline_citations: true
  deduplicate_citations: true
  reject_vague_queries: true
