mode: full
seed: 42
device: cuda

data:
  use_all_kb_docs: false
  max_kb_chunks: 300
  max_retriever_train_pairs: 64
  max_reranker_train_pairs: 192
  max_triage_train_examples: 96
  max_preference_pairs: 32
  max_eval_queries: 32

class_balance:
  answer: 0.50
  ticket: 0.25
  reject: 0.25

training:
  retriever_epochs: 1
  reranker_epochs: 1
  triage_epochs: 1
  preference_epochs: 1

retriever_model_name: sentence-transformers/all-MiniLM-L6-v2
reranker_model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model_name: distilbert-base-uncased
triage_max_length: 128
triage_lr: 0.00002
batch_size: 4
reranker_batch_size: 2
triage_batch_size: 4
gradient_accumulation_steps: 1
fp16: true
top_k_retrieval: 10
top_k_rerank: 5
top_k_domains: 2
tau_domain: 0.35
tau_chunk: 0.30
mu_boundary: 0.15
lambda_boundary: 0.6
use_hf_dataset: true
require_hf_dataset: true
include_fixture_docs: true
