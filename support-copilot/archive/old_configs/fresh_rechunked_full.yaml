mode: full
seed: 42
device: cuda

data:
  use_all_kb_docs: true
  max_retriever_train_pairs: 20000
  max_reranker_train_pairs: 50000
  max_triage_train_examples: 18000
  max_preference_pairs: 8000
  max_eval_queries: 1000
  max_generator_train_examples: 12000
  max_generator_val_examples: 1000

chunking:
  max_words: 90
  min_words: 18
  sentence_overlap: 1

class_balance:
  answer: 0.50
  ticket: 0.25
  reject: 0.25

training:
  retriever_epochs: 2
  reranker_epochs: 1
  triage_epochs: 4
  preference_epochs: 1

retriever_model_name: sentence-transformers/all-MiniLM-L6-v2
reranker_model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model_name: distilbert-base-uncased
triage_max_length: 128
triage_lr: 0.00002
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 1
fp16: true
top_k_retrieval: 20
top_k_rerank: 5
top_k_domains: 3
fallback_to_global_search: true
fallback_score_threshold: 0.75
tau_domain: 0.35
tau_chunk: 0.30
mu_boundary: 0.15
lambda_boundary: 0.6
use_hf_dataset: true
require_hf_dataset: true
include_fixture_docs: true

generator_epochs: 1
generator_training:
  model_name: google/flan-t5-small
  train_file: data/processed/generator_train.jsonl
  val_file: data/processed/generator_val.jsonl
  output_dir: outputs/generator/flan_t5
  epochs: 1
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  max_source_length: 768
  max_target_length: 128
  fp16: true
  local_files_only: true
