mode: full
seed: 42
device: cuda

data:
  max_eval_queries: 1000

routing:
  top_k_domains: 3
  fallback_to_global_search: true
  fallback_score_threshold: 0.75

triage:
  checkpoint: outputs/triage_balanced/distilbert
  reject_threshold: 0.40
  nearest_kb_similarity_threshold: 0.40
  centroid_similarity_threshold: 0.40
  reject_require_lexical_low: true
  ticket_threshold: 0.30

top_k_retrieval: 20
top_k_rerank: 5
max_rerank_candidates: 15
use_reranker: false
tau_domain: 0.35
tau_chunk: 0.30
fp16: true

# Evaluation-only config: reuses existing retriever/index/routing/reranker artifacts
# and uses the balanced triage checkpoint. Do not run run_all.py with this config.
