mode: full
seed: 42
device: cuda

data:
  max_eval_queries: 1000

routing:
  top_k_domains: 3
  fallback_to_global_search: true
  fallback_score_threshold: 0.75

triage:
  reject_threshold: 0.40
  ticket_threshold: 0.35

top_k_retrieval: 20
top_k_rerank: 5
max_rerank_candidates: 15
use_reranker: false
tau_domain: 0.35
tau_chunk: 0.30
fp16: true

# Evaluation-only config: use existing checkpoints under outputs/.
# Neural reranker is bypassed for this calibrated eval to avoid a ~95 minute
# 1000-query CPU-bound cross-encoder pass; retriever score ordering is used.
# Do not run run_all.py with this config unless you intentionally want retraining.
